# Render Blueprint — https://render.com
# Deploy: Dashboard → New → Blueprint → connect repo with this file

services:
  - type: web
    name: pse-quotation-invoice
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /var/data
    disk:
      name: pse-data
      mountPath: /var/data
      sizeGB: 1
